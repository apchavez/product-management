# NOT deployed via `kubectl apply`. The real manifest lives in chart/templates/deployment-web.yaml
# (Helm) and is what deploy.yml actually applies (`helm upgrade --install`).
#
# This file only exists so CI has somewhere to persist the last-built image tag:
# docker-publish-web.yml sed-patches the line below after each build, and deploy.yml
# greps it to read the tag it passes to `helm upgrade --set web.image.tag=...`.
image: ghcr.io/apchavez/product-web:latest
