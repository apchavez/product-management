apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: product-ingress
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

spec:
  ingressClassName: nginx

  tls:
  - hosts:
    - product.local
    secretName: product-local-tls

  rules:
  - host: product.local
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: product-api
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: product-web
            port:
              number: 80
